<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — SmartCampus</title>
  <script src="../../assets/js/theme-init.js"></script>
  <script src="../../assets/js/i18n-init.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body class="sc-app">
  <div class="sc-student-backdrop d-none" data-sc-student-backdrop></div>
  <div id="sc-sidebar-host" data-partial="../../partials/sidebar-student.html"></div>
  <div class="sc-main-student">
    <header class="sc-student-header d-flex align-items-center justify-content-between px-3 px-lg-4">
      <button type="button" class="btn btn-link text-dark d-lg-none p-2" data-sc-student-open><i class="bi bi-list fs-5"></i></button>
      <span class="fw-semibold d-none d-lg-inline">Espace Étudiant</span>
      <div class="dropdown">
        <button type="button" class="btn btn-link text-dark dropdown-toggle" data-bs-toggle="dropdown"><span class="rounded-circle bg-primary text-white fw-semibold d-inline-flex align-items-center justify-content-center" style="width:2rem;height:2rem;font-size:.75rem">JM</span></button>
        <ul class="dropdown-menu dropdown-menu-end"><li><a class="dropdown-item text-danger" href="#" data-sc-logout>Déconnexion</a></li></ul>
      </div>
    </header>
    <main class="p-3 p-lg-4">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
        <div><h1 class="h3 fw-bold d-flex align-items-center gap-2"><i class="bi bi-bell"></i> Notifications</h1><p class="text-muted mb-0" id="sn-sub">—</p></div>
        <div class="d-flex gap-2"><button type="button" class="btn btn-outline-secondary btn-sm"><i class="bi bi-check2"></i> Tout marquer comme lu</button><button type="button" class="btn btn-outline-secondary btn-sm"><i class="bi bi-trash"></i> Supprimer les lues</button></div>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="sc-card p-3 d-flex gap-2"><div class="bg-primary bg-opacity-10 text-primary rounded-circle p-2"><i class="bi bi-bell"></i></div><div><div class="fs-4 fw-bold">6</div><div class="small text-muted">Total</div></div></div></div>
        <div class="col-6 col-md-3"><div class="sc-card p-3 d-flex gap-2"><div class="bg-danger bg-opacity-10 text-danger rounded-circle p-2"><i class="bi bi-exclamation-circle"></i></div><div><div class="fs-4 fw-bold" id="sn-unread-b">—</div><div class="small text-muted">Non lues</div></div></div></div>
        <div class="col-6 col-md-3"><div class="sc-card p-3 d-flex gap-2"><div class="bg-success bg-opacity-10 text-success rounded-circle p-2"><i class="bi bi-mortarboard"></i></div><div><div class="fs-4 fw-bold">2</div><div class="small text-muted">Notes</div></div></div></div>
        <div class="col-6 col-md-3"><div class="sc-card p-3 d-flex gap-2"><div class="bg-warning bg-opacity-10 text-warning rounded-circle p-2"><i class="bi bi-credit-card"></i></div><div><div class="fs-4 fw-bold">1</div><div class="small text-muted">Paiements</div></div></div></div>
      </div>
      <div class="btn-group flex-wrap mb-3" role="group">
        <button type="button" class="btn btn-outline-primary btn-sm active" data-sn-filter="all">Toutes (6)</button>
        <button type="button" class="btn btn-outline-primary btn-sm" data-sn-filter="unread">Non lues</button>
        <button type="button" class="btn btn-outline-primary btn-sm" data-sn-filter="grades">Notes</button>
        <button type="button" class="btn btn-outline-primary btn-sm" data-sn-filter="payments">Paiements</button>
      </div>
      <div class="sc-card overflow-hidden p-0" id="sn-list-wrap"><div id="sn-list"></div></div>
    </main>
  </div>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/config.js"></script><script src="../../assets/js/utils.js"></script><script src="../../assets/js/mock-data.js"></script><script src="../../assets/js/api.js"></script><script src="../../assets/js/auth.js"></script><script src="../../assets/js/layout.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/i18n.js"></script>
  <script src="../../assets/js/student/student-api.js"></script>
  <script src="../../assets/js/student/notifications.js"></script>
  <script>SC_Layout.init({ role: 'student' });</script>
</body>
</html>
