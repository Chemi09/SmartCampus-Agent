<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Notes — SmartCampus</title>
  <script src="../../assets/js/theme-init.js"></script>
  <script src="../../assets/js/i18n-init.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body class="sc-app">
  <div class="sc-backdrop d-none" data-sc-backdrop></div>
  <button type="button" class="btn btn-light border sc-mobile-toggle d-md-none shadow-sm" data-sc-mobile-menu><i class="bi bi-list"></i></button>
  <div id="sc-sidebar-host" data-partial="../../partials/sidebar-admin.html"></div>
  <div class="sc-main-admin">
    <div class="container-fluid px-3 px-md-4 py-4">
      <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mb-4">
        <div>
          <h1 class="h2 fw-bold mb-1" data-i18n="page.grades.title">Gestion des Notes</h1>
          <p class="text-muted mb-0">Consultez et gérez les résultats académiques</p>
        </div>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary btn-sm"><i class="bi bi-download me-1"></i>Exporter</button>
          <button type="button" class="btn btn-primary btn-sm"><i class="bi bi-mortarboard me-1"></i>Saisir Notes</button>
        </div>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-sm-6 col-xl-3">
          <div class="sc-stat-card p-3"><div class="d-flex justify-content-between mb-2"><span class="small text-muted">Total Notes</span><span class="sc-stat-icon"><i class="bi bi-journal-bookmark"></i></span></div><div class="fs-4 fw-bold" id="stat-total-grades">—</div></div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="sc-stat-card p-3"><div class="d-flex justify-content-between mb-2"><span class="small text-muted">Moyenne Générale</span><span class="sc-stat-icon"><i class="bi bi-mortarboard"></i></span></div><div class="fs-4 fw-bold" id="stat-avg">—</div></div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="sc-stat-card sc-variant-success p-3"><div class="d-flex justify-content-between mb-2"><span class="small text-muted">Notes Validées</span><span class="sc-stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-award"></i></span></div><div class="fs-4 fw-bold" id="stat-passed">—</div></div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="sc-stat-card sc-variant-success p-3"><div class="d-flex justify-content-between mb-2"><span class="small text-muted">Taux de Réussite</span><span class="sc-stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-graph-up-arrow"></i></span></div><div class="fs-4 fw-bold" id="stat-rate">—</div></div>
        </div>
      </div>
      <div class="sc-card p-3 mb-4">
        <div class="row g-3">
          <div class="col-md">
            <div class="input-group"><span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
              <input type="search" class="form-control" id="search-grades" placeholder="Rechercher par étudiant, matière ou code..."></div>
          </div>
          <div class="col-md-auto">
            <select class="form-select" id="filter-semester" style="min-width: 11rem">
              <option value="all">Tous les semestres</option>
              <option value="S1">Semestre 1</option>
              <option value="S2">Semestre 2</option>
            </select>
          </div>
        </div>
      </div>
      <div class="sc-card overflow-hidden">
        <div class="p-3 border-bottom"><h2 class="h5 fw-bold mb-1">Relevé des Notes</h2><p class="small text-muted mb-0"><span id="grades-found">0</span> résultats trouvés</p></div>
        <div class="table-responsive">
          <table class="table table-hover mb-0 sc-table">
            <thead><tr><th class="ps-3">Étudiant</th><th class="d-none d-md-table-cell">Code</th><th>Matière</th><th class="text-center">Crédits</th><th class="text-center">Note</th><th class="text-center d-none d-sm-table-cell">Semestre</th><th class="text-center">Statut</th></tr></thead>
            <tbody id="grades-tbody"></tbody>
          </table>
        </div>
        <div id="grades-empty" class="text-center py-5 d-none"><i class="bi bi-mortarboard fs-1 text-muted"></i><h3 class="h5 mt-3">Aucune note trouvée</h3><p class="text-muted">Essayez de modifier vos critères de recherche</p></div>
      </div>
    </div>
  </div>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/mock-data.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/i18n.js"></script>
  <script src="../../assets/js/admin/grades.js"></script>
  <script>SC_Layout.init({ role: 'admin' });</script>
</body>
</html>
